root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -buildvcs=false -o ./tmp/main /app/cmd/api"
bin = "./tmp/main"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor"]
poll = true
poll_interval = 1000

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true

[watcher]
poll = true
poll_interval = 1000
